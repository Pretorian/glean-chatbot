<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="600" y="40" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">Glean RAG Chatbot — Architecture &amp; Data Flow</text>
  <text x="600" y="62" font-size="13" fill="#64748b" text-anchor="middle">MCP-exposed prototype using Glean Indexing, Search, and Chat APIs</text>

  <!-- === SWIMLANE: LOCAL ENVIRONMENT === -->
  <rect x="30" y="90" width="540" height="680" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="50" y="115" font-size="13" font-weight="600" fill="#475569">LOCAL ENVIRONMENT</text>
  <line x1="50" y1="122" x2="220" y2="122" stroke="#cbd5e1" stroke-width="1"/>

  <!-- MCP Client -->
  <rect x="70" y="145" width="200" height="75" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="170" y="172" font-size="14" font-weight="600" fill="#3730a3" text-anchor="middle">MCP Client</text>
  <text x="170" y="192" font-size="11" fill="#4338ca" text-anchor="middle">Cursor / Claude Desktop</text>
  <text x="170" y="208" font-size="11" fill="#64748b" text-anchor="middle">natural-language question</text>

  <!-- User icon near MCP client -->
  <circle cx="50" cy="182" r="18" fill="#6366f1"/>
  <text x="50" y="187" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">U</text>
  <text x="50" y="215" font-size="10" fill="#64748b" text-anchor="middle">user</text>

  <!-- MCP stdio link -->
  <path d="M 270 182 L 340 182" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="305" y="175" font-size="10" fill="#64748b" text-anchor="middle" font-style="italic">MCP / stdio</text>

  <!-- MCP Server -->
  <rect x="340" y="145" width="210" height="75" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
  <text x="445" y="172" font-size="14" font-weight="600" fill="#155e75" text-anchor="middle">MCP Server</text>
  <text x="445" y="192" font-size="11" fill="#0e7490" text-anchor="middle">mcp_server.py</text>
  <text x="445" y="208" font-size="10" fill="#64748b" text-anchor="middle">tool: ask_knowledge_base</text>

  <!-- RAG Orchestrator -->
  <rect x="110" y="270" width="380" height="120" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="300" y="295" font-size="14" font-weight="600" fill="#92400e" text-anchor="middle">RAG Orchestrator (rag.py)</text>

  <rect x="130" y="310" width="100" height="60" rx="6" fill="#fff" stroke="#d97706" stroke-width="1"/>
  <text x="180" y="332" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">retrieve()</text>
  <text x="180" y="350" font-size="10" fill="#78716c" text-anchor="middle">query → top-k</text>
  <text x="180" y="363" font-size="10" fill="#78716c" text-anchor="middle">citations</text>

  <rect x="250" y="310" width="100" height="60" rx="6" fill="#fff" stroke="#d97706" stroke-width="1"/>
  <text x="300" y="332" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">ground()</text>
  <text x="300" y="350" font-size="10" fill="#78716c" text-anchor="middle">chat w/ context</text>
  <text x="300" y="363" font-size="10" fill="#78716c" text-anchor="middle">+ guardrails</text>

  <rect x="370" y="310" width="100" height="60" rx="6" fill="#fff" stroke="#d97706" stroke-width="1"/>
  <text x="420" y="332" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">assemble()</text>
  <text x="420" y="350" font-size="10" fill="#78716c" text-anchor="middle">answer +</text>
  <text x="420" y="363" font-size="10" fill="#78716c" text-anchor="middle">source refs</text>

  <!-- MCP → RAG arrow -->
  <path d="M 445 220 L 445 245 L 300 245 L 300 270" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Indexer (one-time setup) -->
  <rect x="110" y="430" width="380" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="300" y="455" font-size="14" font-weight="600" fill="#166534" text-anchor="middle">Indexer (indexer.py)</text>
  <text x="300" y="475" font-size="11" fill="#15803d" text-anchor="middle">one-time / scheduled ingestion</text>
  <text x="300" y="495" font-size="10" fill="#64748b" text-anchor="middle">reads /corpus → pushes to Glean sandbox datasource</text>
  <text x="300" y="510" font-size="10" fill="#64748b" text-anchor="middle">idempotent via stable document IDs</text>

  <!-- Local corpus -->
  <rect x="180" y="570" width="240" height="80" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="300" y="598" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">Local Corpus</text>
  <text x="300" y="617" font-size="10" fill="#64748b" text-anchor="middle">10–30 docs (HR policies, ADRs,</text>
  <text x="300" y="631" font-size="10" fill="#64748b" text-anchor="middle">product docs — constrained set)</text>

  <!-- Corpus → Indexer -->
  <path d="M 300 570 L 300 520" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Config & secrets -->
  <rect x="60" y="680" width="200" height="65" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="160" y="705" font-size="12" font-weight="600" fill="#991b1b" text-anchor="middle">Config / Secrets</text>
  <text x="160" y="723" font-size="10" fill="#7f1d1d" text-anchor="middle">.env — GLEAN_API_TOKEN</text>
  <text x="160" y="736" font-size="10" fill="#7f1d1d" text-anchor="middle">datasource, base URL</text>

  <!-- Observability sidecar -->
  <rect x="340" y="680" width="210" height="65" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="445" y="705" font-size="12" font-weight="600" fill="#5b21b6" text-anchor="middle">Local Observability</text>
  <text x="445" y="723" font-size="10" fill="#6b21a8" text-anchor="middle">structured logs, trace IDs,</text>
  <text x="445" y="736" font-size="10" fill="#6b21a8" text-anchor="middle">per-API latency</text>

  <!-- === SWIMLANE: GLEAN PLATFORM === -->
  <rect x="600" y="90" width="570" height="680" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="620" y="115" font-size="13" font-weight="600" fill="#475569">GLEAN PLATFORM (sandbox tenant)</text>
  <line x1="620" y1="122" x2="840" y2="122" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Indexing API -->
  <rect x="640" y="150" width="200" height="75" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="740" y="177" font-size="14" font-weight="600" fill="#14532d" text-anchor="middle">Indexing API</text>
  <text x="740" y="196" font-size="10" fill="#166534" text-anchor="middle">/api/index/v1/documents</text>
  <text x="740" y="211" font-size="10" fill="#64748b" text-anchor="middle">bulk upsert, permissions, ACLs</text>

  <!-- Search API -->
  <rect x="640" y="260" width="200" height="75" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="740" y="287" font-size="14" font-weight="600" fill="#1e3a8a" text-anchor="middle">Search API</text>
  <text x="740" y="306" font-size="10" fill="#1e40af" text-anchor="middle">/rest/api/v1/search</text>
  <text x="740" y="321" font-size="10" fill="#64748b" text-anchor="middle">ranked results, snippets, URLs</text>

  <!-- Chat API -->
  <rect x="640" y="370" width="200" height="75" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="740" y="397" font-size="14" font-weight="600" fill="#831843" text-anchor="middle">Chat API</text>
  <text x="740" y="416" font-size="10" fill="#9d174d" text-anchor="middle">/rest/api/v1/chat</text>
  <text x="740" y="431" font-size="10" fill="#64748b" text-anchor="middle">grounded answer, citations</text>

  <!-- Datasource (sandbox) -->
  <rect x="900" y="200" width="230" height="220" rx="10" fill="#fefce8" stroke="#a16207" stroke-width="1.5"/>
  <text x="1015" y="225" font-size="13" font-weight="600" fill="#713f12" text-anchor="middle">Sandbox Datasource</text>
  <text x="1015" y="243" font-size="10" fill="#854d0e" text-anchor="middle">(e.g. custom_kb_prototype)</text>

  <!-- Mini "documents" inside datasource -->
  <g transform="translate(920, 260)">
    <rect width="50" height="60" rx="3" fill="#fff" stroke="#a16207"/>
    <line x1="8" y1="12" x2="42" y2="12" stroke="#a16207" stroke-width="0.8"/>
    <line x1="8" y1="22" x2="42" y2="22" stroke="#a16207" stroke-width="0.8"/>
    <line x1="8" y1="32" x2="42" y2="32" stroke="#a16207" stroke-width="0.8"/>
    <line x1="8" y1="42" x2="35" y2="42" stroke="#a16207" stroke-width="0.8"/>
  </g>
  <g transform="translate(985, 260)">
    <rect width="50" height="60" rx="3" fill="#fff" stroke="#a16207"/>
    <line x1="8" y1="12" x2="42" y2="12" stroke="#a16207" stroke-width="0.8"/>
    <line x1="8" y1="22" x2="42" y2="22" stroke="#a16207" stroke-width="0.8"/>
    <line x1="8" y1="32" x2="42" y2="32" stroke="#a16207" stroke-width="0.8"/>
  </g>
  <g transform="translate(1050, 260)">
    <rect width="50" height="60" rx="3" fill="#fff" stroke="#a16207"/>
    <line x1="8" y1="12" x2="42" y2="12" stroke="#a16207" stroke-width="0.8"/>
    <line x1="8" y1="22" x2="42" y2="22" stroke="#a16207" stroke-width="0.8"/>
    <line x1="8" y1="32" x2="42" y2="32" stroke="#a16207" stroke-width="0.8"/>
    <line x1="8" y1="42" x2="40" y2="42" stroke="#a16207" stroke-width="0.8"/>
  </g>

  <text x="1015" y="345" font-size="10" fill="#854d0e" text-anchor="middle">Enterprise Graph + Personal Graph</text>
  <text x="1015" y="360" font-size="10" fill="#854d0e" text-anchor="middle">(vector index, ACLs, permissions)</text>
  <text x="1015" y="380" font-size="9" fill="#64748b" text-anchor="middle" font-style="italic">Chat can also retrieve directly</text>
  <text x="1015" y="393" font-size="9" fill="#64748b" text-anchor="middle" font-style="italic">(alternative pattern — see design note)</text>

  <!-- Indexing API → Datasource -->
  <path d="M 840 187 L 900 220" stroke="#15803d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Datasource → Search -->
  <path d="M 900 320 L 840 300" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Datasource → Chat (dashed, alt flow) -->
  <path d="M 900 380 L 840 407" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-dashed)"/>

  <!-- === ARROWS BETWEEN SWIMLANES === -->

  <!-- Indexer → Indexing API -->
  <path d="M 490 470 Q 570 470, 580 340 Q 590 200, 640 188" stroke="#15803d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="560" y="430" font-size="10" fill="#15803d" font-style="italic">(1) index docs</text>

  <!-- RAG retrieve() → Search API -->
  <path d="M 230 340 Q 570 340, 640 297" stroke="#1d4ed8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="555" y="330" font-size="10" fill="#1d4ed8" font-style="italic">(2) search</text>

  <!-- RAG ground() → Chat API -->
  <path d="M 350 340 Q 570 400, 640 407" stroke="#be185d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="560" y="395" font-size="10" fill="#be185d" font-style="italic">(3) chat (context-grounded)</text>

  <!-- Legend -->
  <rect x="620" y="490" width="520" height="265" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="640" y="515" font-size="12" font-weight="600" fill="#334155">Legend &amp; Flow</text>

  <!-- Flow steps -->
  <text x="640" y="545" font-size="11" font-weight="600" fill="#15803d">① Indexing (setup)</text>
  <text x="660" y="561" font-size="10" fill="#475569">local corpus → Indexing API → sandbox datasource</text>
  <text x="660" y="575" font-size="10" fill="#475569">stable IDs = idempotent re-runs</text>

  <text x="640" y="600" font-size="11" font-weight="600" fill="#1d4ed8">② Retrieve (per question)</text>
  <text x="660" y="616" font-size="10" fill="#475569">MCP tool receives question → Search API</text>
  <text x="660" y="630" font-size="10" fill="#475569">returns top-k results with snippets, titles, URLs</text>

  <text x="640" y="655" font-size="11" font-weight="600" fill="#be185d">③ Ground &amp; respond</text>
  <text x="660" y="671" font-size="10" fill="#475569">Chat API called with question + retrieved context</text>
  <text x="660" y="685" font-size="10" fill="#475569">returns grounded answer with source citations</text>
  <text x="660" y="699" font-size="10" fill="#475569">MCP tool returns {answer, sources[]} to client</text>

  <line x1="640" y1="712" x2="1120" y2="712" stroke="#cbd5e1" stroke-width="1"/>
  <text x="640" y="730" font-size="10" fill="#64748b" font-style="italic">Dashed line: alternative pattern where Chat API performs retrieval itself</text>
  <text x="640" y="744" font-size="10" fill="#64748b" font-style="italic">(simpler, but loses explicit control over top-k and source filtering — discussed in design note)</text>
</svg>
